name: safe_call
description: "A safety companion app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Background and Hardware
  flutter_background_service: ^5.1.0
  record: ^6.1.2
  tflite_flutter: ^0.12.1
  sensors_plus: ^7.0.0
  geolocator: ^14.0.2
  flutter_local_notifications: ^17.0.0
  permission_handler: ^12.0.1
  background_sms: ^0.0.4
  url_launcher: ^6.3.2
  flutter_overlay_window: ^0.3.0
  vibration: ^2.0.0
  wakelock_plus: ^1.2.8
  lottie: ^3.3.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/models/
